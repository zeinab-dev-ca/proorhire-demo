// helpers
function getJob(id){ return db.jobs.find(j=>j.id===id); }
function getEmployer(id){ return db.employers.find(e=>e.id===id); }
function getSeeker(id){ return db.seekers.find(s=>s.id===id); }
function getJobApplications(jobId){ return db.applications.filter(a=>a.jobId===jobId); }
function getSeekerApplications(seekerId){ return db.applications.filter(a=>a.seekerId===seekerId); }
function getEmployerJobs(empId){ return db.jobs.filter(j=>j.employerId===empId); }

function navigate(route, params={}){
  state.route = route;
  state.routeParams = params;
  render();
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
function showToast(msg, color='var(--green)'){
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = color;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

function render(){
  const app = document.getElementById('app');
  const routes = {
    landing: renderLanding,
    'employer-auth': renderEmployerAuth,
    'seeker-auth': renderSeekerAuth,
    'employer-dashboard': renderDashboard,
    'job-detail': renderJobDetail,
    'post-job': renderPostJob,
    'job-board': renderJobBoard,
    'apply': renderApplyForm,
    'apply-result': renderApplyResult,
    'seeker-profile': renderSeekerProfile,
    'seeker-dashboard': renderSeekerDashboard,
  };
  const fn = routes[state.route] || renderLanding;
  app.innerHTML = renderNav() + fn();
  attachEvents();
}

function renderDashboard(){
  if(!state.currentUser || state.userType!=='employer') return `<div class="page"><div class="empty-state"><div class="icon">🔒</div><p>Please sign in as an employer.</p><br><button class="btn-gold" onclick="navigate('employer-auth')">Sign In</button></div></div>`;
  const emp = state.currentUser;
  const jobs = getEmployerJobs(emp.id);
  let totalApps=0, totalPassed=0, totalShortlisted=0;
  jobs.forEach(j=>{
    const apps = getJobApplications(j.id);
    totalApps += apps.length;
    totalPassed += apps.filter(a=>a.status==='passed').length;
    totalShortlisted += apps.filter(a=>a.shortlisted).length;
  });

  const jobRows = jobs.length ? jobs.map(j=>{
    const apps = getJobApplications(j.id);
    const passed = apps.filter(a=>a.status==='passed').length;
    const knocked = apps.filter(a=>a.status==='knocked').length;
    return `<div class="table-row">
      <div class="job-title-cell"><strong>${j.title}</strong><span>${j.location} · ${j.type}</span></div>
      <div><span class="tag">${j.sector}</span></div>
      <div style="font-size:14px">${apps.length}</div>
      <div><span class="badge badge-green">${passed} passed</span></div>
      <div><span class="badge badge-red">${knocked} out</span></div>
      <div><button class="btn-gold btn-sm" onclick="navigate('job-detail',{jobId:'${j.id}'})">View →</button></div>
    </div>`;
  }).join('') : `<div class="empty-state"><div class="icon">📋</div><p>No jobs posted yet.</p></div>`;

  return `<div class="page">
    <div class="dash-header">
      <div>
        <p style="color:var(--muted);font-size:14px;margin-bottom:4px">Welcome back,</p>
        <div class="dash-title">${emp.company}</div>
      </div>
      <button class="btn-gold" onclick="navigate('post-job')">+ Post New Job</button>
    </div>
    <div class="stats-cards">
      <div class="stat-card"><div class="num">${jobs.length}</div><div class="lbl">Active Jobs</div></div>
      <div class="stat-card"><div class="num">${totalApps}</div><div class="lbl">Total Applications</div></div>
      <div class="stat-card"><div class="num" style="color:var(--green)">${totalPassed}</div><div class="lbl">Passed Verification</div></div>
      <div class="stat-card"><div class="num" style="color:var(--gold)">${totalShortlisted}</div><div class="lbl">Shortlisted</div></div>

}

function renderJobDetail(){
  if(!state.currentUser || state.userType!=='employer') return `<div class="page"><div class="empty-state"><button class="btn-gold" onclick="navigate('employer-auth')">Sign In</button></div></div>`;
  const job = getJob(state.routeParams.jobId);
  if(!job) return `<div class="page"><div class="empty-state"><div class="icon">❌</div><p>Job not found.</p></div></div>`;
  const apps = getJobApplications(job.id);
  const passed = apps.filter(a=>a.status==='passed');
  const knocked = apps.filter(a=>a.status==='knocked');

  const passedRows = passed.length ? passed.map(a=>{
    const s = getSeeker(a.seekerId);
    if(!s) return '';
    return `<div class="applicant-row">
      <div class="applicant-info">
        <strong>${s.name}</strong>
        <span>${s.location} · ${s.sector}</span>
        <div class="cert-list">${s.certs.map(c=>`<span class="badge badge-green">✓ ${c}</span>`).join('')}</div>
      </div>
      <div class="applicant-actions">
        <button class="${a.shortlisted?'btn-gold':'btn-green'} btn-sm" onclick="toggleShortlist('${a.id}')">${a.shortlisted?'★ Shortlisted':'☆ Shortlist'}</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state" style="padding:40px"><div class="icon">👤</div><p style="font-size:13px">No passed applicants yet.</p></div>`;

  const knockedRows = knocked.length ? knocked.map(a=>{
    const s = getSeeker(a.seekerId);
    if(!s) return '';
    return `<div class="applicant-row">
      <div class="applicant-info">
        <strong>${s.name}</strong>
        <span>${s.location}</span>
        <div class="knockout-reason">✕ ${a.knockoutReason||'Did not meet knockout criteria.'}</div>
      </div>
      <div><span class="badge badge-red">Knocked Out</span></div>
    </div>`;
  }).join('') : `<div class="empty-state" style="padding:40px"><div class="icon">🎯</div><p style="font-size:13px">No knockouts yet.</p></div>`;

  const publicUrl = `#apply/${job.id}`;
  return `<div class="page">
    <div class="back-link" onclick="navigate('employer-dashboard')">← Back to Dashboard</div>
    <div class="detail-header">
      <h1>${job.title}</h1>
      <div class="detail-meta">
        <span class="badge badge-green">Active</span>
        <span class="tag">📍 ${job.location}</span>
        <span class="tag">💰 ${job.salary}</span>
        <span class="tag">⏱ ${job.type}</span>
        <span class="tag">📅 Posted ${job.posted}</span>
      </div>
      <div style="margin-top:16px;padding:12px 16px;background:var(--black);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <p style="font-size:12px;color:var(--muted);margin-bottom:3px">Public Application Link</p>
          <p style="font-size:13px;color:var(--gold);font-family:monospace">proofhire.app/jobs/${job.id}</p>
        </div>
        <button class="btn-dark btn-sm" onclick="openPublicJob('${job.id}')">Open Public View →</button>
      </div>
    </div>
    <div class="split-panel">
      <div class="panel">
        <div class="panel-header">
          <h3><span style="color:var(--green)">✓</span> Passed Verification <span class="badge badge-green">${passed.length}</span></h3>
        </div>
        ${passedRows}
      </div>
      <div class="panel">
        <div class="panel-header">
          <h3><span style="color:var(--red)">✕</span> Knocked Out <span class="badge badge-red">${knocked.length}</span></h3>
        </div>
        ${knockedRows}
      </div>
    </div>
  </div>`;
}

          <div class="form-group"><label>Question</label><input class="ko-q" placeholder="e.g. Do you hold a valid Ontario Forklift certificate?"></div>
          <div class="grid-2">
            <div class="form-group"><label>Correct Answer (required to pass)</label><input class="ko-correct" placeholder="e.g. Yes"></div>
            <div class="form-group"><label>Other Options (comma-separated)</label><input class="ko-others" placeholder="e.g. No, In progress"></div>
          </div>
        </div>
      </div>
      <button class="btn-dark" style="width:100%;margin-bottom:24px" onclick="addKOQuestion()">+ Add Knockout Question</button>

let koCount = 1;
function addKOQuestion(){
  const list = document.getElementById('ko-questions-list');
  const div = document.createElement('div');
  div.className = 'ko-builder';
  div.id = `ko-${koCount}`;
  div.innerHTML = `<div class="ko-header"><span>Question ${koCount+1}</span><button class="btn-dark btn-sm" onclick="removeKO(${koCount})">Remove</button></div>
    <div class="form-group"><label>Question</label><input class="ko-q" placeholder="Knockout question..."></div>
    <div class="grid-2">
      <div class="form-group"><label>Correct Answer</label><input class="ko-correct" placeholder="e.g. Yes"></div>
      <div class="form-group"><label>Other Options (comma-separated)</label><input class="ko-others" placeholder="e.g. No, Maybe"></div>
    </div>`;
  list.appendChild(div);
  koCount++;
}
function removeKO(id){ const el = document.getElementById(`ko-${id}`); if(el) el.remove(); }

function submitJob(){
  const title = document.getElementById('pj-title').value.trim();
  const desc = document.getElementById('pj-desc').value.trim();
  if(!title){ document.getElementById('post-err').innerHTML='<div class="alert alert-err">Job title is required.</div>'; return; }
  const koBuilders = document.querySelectorAll('.ko-builder');
  const kqs = [];
  koBuilders.forEach((b,i)=>{
    const q = b.querySelector('.ko-q').value.trim();
    const correct = b.querySelector('.ko-correct').value.trim();
    const others = b.querySelector('.ko-others').value.split(',').map(s=>s.trim()).filter(Boolean);
    if(q && correct){ kqs.push({ id:`nkq${Date.now()}${i}`, question:q, correctAnswer:correct, options:[correct, ...others] }); }
  });
  const reqs = document.getElementById('pj-reqs').value.split(',').map(s=>s.trim()).filter(Boolean);
  const newJob = {
    id: `j${Date.now()}`, employerId: state.currentUser.id,
    title, sector: document.getElementById('pj-sector').value,
    location: document.getElementById('pj-location').value,
    salary: document.getElementById('pj-salary').value,
    type: document.getElementById('pj-type').value,
    description: desc, requirements: reqs,
    knockoutQuestions: kqs, active: true,
    posted: new Date().toISOString().split('T')[0],
  };
  db.jobs.push(newJob);
  koCount = 1;
  showToast('✓ Job posted successfully!');
  navigate('employer-dashboard');
}

      </div>
      <button class="btn-gold" style="width:100%;padding:14px;margin-top:8px;font-size:16px" onclick="submitApplication('${job.id}')">Submit Application →</button>

function toggleCertCheck(i){
  const cb = document.getElementById(`cert-${i}`);
  const label = document.getElementById(`cert-check-${i}`);
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}
function selectKOOption(qi, oi){
  const opts = document.querySelectorAll(`[id^="ko-opt-${qi}-"]`);
  opts.forEach(o=>o.classList.remove('selected'));
  const selected = document.getElementById(`ko-opt-${qi}-${oi}`);
  if(selected){
    selected.classList.add('selected');
    selected.querySelector('input').checked = true;
  }
}

function submitApplication(jobId){
  const job = getJob(jobId);
  if(!job) return;
  const seeker = state.currentUser && state.userType==='seeker' ? state.currentUser : null;
  let applicantName, applicantId;

  if(seeker){
    applicantName = seeker.name;
    applicantId = seeker.id;
  } else {
    applicantName = document.getElementById('app-name')?.value.trim();
    if(!applicantName){ document.getElementById('apply-err').innerHTML='<div class="alert alert-err">Please enter your name.</div>'; return; }
    // Create a temporary guest seeker
    const guestId = `guest-${Date.now()}`;
    const guestSeeker = {
      id: guestId, name: applicantName,
      email: document.getElementById('app-email')?.value||'',
      phone: document.getElementById('app-phone')?.value||'',
      location: document.getElementById('app-location')?.value||'Niagara Region',
      sector: job.sector, experience: document.getElementById('app-exp')?.value||'',
      certs: [], availability:'Full-time', transport:false,
    };
    // get checked certs
    job.requirements.forEach((r,i)=>{ const cb=document.getElementById(`cert-${i}`); if(cb&&cb.checked) guestSeeker.certs.push(r); });
    db.seekers.push(guestSeeker);
    applicantId = guestId;
  }

  // Evaluate knockout questions
  const koResults = [];
  let knockedOut = false;
  let knockoutReason = '';
  job.knockoutQuestions.forEach((q,i)=>{
    const selected = document.querySelector(`input[name="ko-${i}"]:checked`);
    const answer = selected ? selected.value : '';
    const passed = answer === q.correctAnswer;
    koResults.push({ id: q.id, answer, passed });
    if(!passed && !knockedOut){
      knockedOut = true;
      knockoutReason = answer
        ? `You answered "${answer}" — this role requires: "${q.correctAnswer}".`
        : `Question ${i+1} was not answered.`;
    }
  });

  if(job.knockoutQuestions.length > 0 && koResults.some(r=>!r.answer)){
    document.getElementById('apply-err').innerHTML='<div class="alert alert-err">Please answer all screening questions.</div>';
    return;
  }

  const appId = `a${Date.now()}`;
  const newApp = {
    id: appId, jobId, seekerId: applicantId,
    status: knockedOut ? 'knocked' : 'passed',
    appliedAt: new Date().toISOString().split('T')[0],
    koResults, knockoutReason, shortlisted: false,
  };
  db.applications.push(newApp);
  db.pendingApp = { app: newApp, job, knockedOut, knockoutReason };
  navigate('apply-result', { appId });
}

        }).join('')}

function toggleProfileCert(i, cert){
  const cb = document.getElementById(`pcert-${i}`);
  const label = document.getElementById(`pcert-check-${i}`);
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
  if(cb.checked){ if(!state.currentUser.certs.includes(cert)) state.currentUser.certs.push(cert); }
  else { state.currentUser.certs = state.currentUser.certs.filter(c=>c!==cert); }
}

function saveProfile(){
  const s = state.currentUser;
  s.name = document.getElementById('prof-name').value;
  s.phone = document.getElementById('prof-phone').value;
  s.location = document.getElementById('prof-location').value;
  s.sector = document.getElementById('prof-sector').value;
  s.experience = document.getElementById('prof-exp').value;
  s.availability = document.getElementById('prof-avail').value;
  s.transport = document.getElementById('prof-transport').checked;
  showToast('✓ Profile saved!');
  render();
}

function renderSeekerDashboard(){

  const s = state.currentUser;
  const apps = getSeekerApplications(s.id);
  const passed = apps.filter(a=>a.status==='passed').length;
  const knocked = apps.filter(a=>a.status==='knocked').length;

  const appList = apps.length ? apps.map(a=>{
    const job = getJob(a.jobId);
    if(!job) return '';
    const emp = getEmployer(job.employerId);
    return `<div class="applicant-row">
      <div class="applicant-info">
        <strong>${job.title}</strong>
        <span>${emp?emp.company:''} · ${job.location}</span>
        <div style="margin-top:6px"><span style="font-size:12px;color:var(--muted)">Applied ${a.appliedAt}</span></div>
        ${a.status==='knocked'?`<div class="knockout-reason" style="margin-top:4px">✕ ${a.knockoutReason}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <span class="badge ${a.status==='passed'?'badge-green':'badge-red'}">${a.status==='passed'?'✓ Passed':'✕ Knocked Out'}</span>
        ${a.shortlisted?`<span class="badge badge-gold">★ Shortlisted</span>`:''}
      </div>
    </div>`;
  }).join('') : `<div class="empty-state"><div class="icon">📋</div><p>No applications yet.</p><br><button class="btn-gold" onclick="navigate('job-board')">Browse Jobs</button></div>`;

  return `<div class="page">
    <div class="dash-header">
      <div>
        <p style="color:var(--muted);font-size:14px;margin-bottom:4px">Welcome back,</p>
        <div class="dash-title">${s.name}</div>
      </div>
      <button class="btn-gold" onclick="navigate('job-board')">Browse Jobs →</button>
    </div>
    <div class="stats-cards">
      <div class="stat-card"><div class="num">${apps.length}</div><div class="lbl">Applications Sent</div></div>
      <div class="stat-card"><div class="num" style="color:var(--green)">${passed}</div><div class="lbl">Passed Verification</div></div>
      <div class="stat-card"><div class="num" style="color:var(--red)">${knocked}</div><div class="lbl">Knocked Out (with reason)</div></div>
      <div class="stat-card"><div class="num" style="color:var(--gold)">${s.certs.length}</div><div class="lbl">Verified Certifications</div></div>
    </div>
    <div class="section-title">My Applications</div>
    <div class="jobs-table">${appList}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// AUTH FUNCTIONS
// ═══════════════════════════════════════════════════
function switchAuthTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('auth-login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('auth-register-form').style.display = tab==='register'?'block':'none';
}

function employerLogin(){
  const email = document.getElementById('emp-email').value.trim();
  const pass = document.getElementById('emp-pass').value;
  const emp = db.employers.find(e=>e.email===email && e.password===pass);
  if(!emp){ document.getElementById('login-err').innerHTML='<div class="alert alert-err">Invalid credentials. Try demo@proofhire.com / Demo@1234</div>'; return; }
  state.currentUser = emp; state.userType = 'employer';
  showToast(`Welcome back, ${emp.company}!`);
  navigate('employer-dashboard');
}

function employerRegister(){
  const name = document.getElementById('reg-name').value.trim();
  const company = document.getElementById('reg-company').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if(!name||!company||!email||!pass){ document.getElementById('register-err').innerHTML='<div class="alert alert-err">All fields are required.</div>'; return; }
  if(db.employers.find(e=>e.email===email)){ document.getElementById('register-err').innerHTML='<div class="alert alert-err">Email already registered.</div>'; return; }
  const newEmp = { id:`e${Date.now()}`, name, company, email, password:pass, sector: document.getElementById('reg-sector').value };
  db.employers.push(newEmp);
  state.currentUser = newEmp; state.userType = 'employer';
  showToast(`Welcome to ProofHire, ${company}!`);
  navigate('employer-dashboard');
}

function seekerLogin(){
  const email = document.getElementById('sk-email').value.trim();
  const pass = document.getElementById('sk-pass').value;
  const s = db.seekers.find(s=>s.email===email && s.password===pass);
  if(!s){ document.getElementById('login-err').innerHTML='<div class="alert alert-err">Invalid credentials. Try jordan@demo.com / Demo@1234</div>'; return; }
  state.currentUser = s; state.userType = 'seeker';
  showToast(`Welcome back, ${s.name}!`);
  navigate('seeker-dashboard');
}

function seekerRegister(){
  const name = document.getElementById('sreg-name').value.trim();
  const email = document.getElementById('sreg-email').value.trim();
  const pass = document.getElementById('sreg-pass').value;
  if(!name||!email||!pass){ document.getElementById('register-err').innerHTML='<div class="alert alert-err">Name, email, and password are required.</div>'; return; }
  if(db.seekers.find(s=>s.email===email)){ document.getElementById('register-err').innerHTML='<div class="alert alert-err">Email already registered.</div>'; return; }
  const newSeeker = { id:`s${Date.now()}`, name, email, password:pass,
    phone:document.getElementById('sreg-phone').value,
    location:document.getElementById('sreg-location').value||'Niagara Region, ON',
    sector:document.getElementById('sreg-sector').value,
    experience:'', certs:[], availability:'Full-time', transport:false };
  db.seekers.push(newSeeker);
  state.currentUser = newSeeker; state.userType = 'seeker';
  showToast(`Welcome to ProofHire, ${name}! Now build your profile.`);
  navigate('seeker-profile');
}

function logout(){
  state.currentUser = null; state.userType = null;
  navigate('landing');
}

function toggleShortlist(appId){
  const app = db.applications.find(a=>a.id===appId);
  if(app){ app.shortlisted = !app.shortlisted; showToast(app.shortlisted?'★ Shortlisted!':'Removed from shortlist','var(--gold)'); render(); }
}

function openPublicJob(jobId){
  navigate('apply', { jobId });
}

function attachEvents(){ /* events are inline */ }

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
render();
</script>
